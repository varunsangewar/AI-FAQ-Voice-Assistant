<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Centered Full-Screen Background */
        body { 
            background-color: #1a1a27 !important; 
            color: #fff !important; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* REGISTER CARD */
        .register-card {
            background-color: #1e1e2d;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid #2d2d3b;
            text-align: center;
        }

        /* HEADER & LOGO */
        .logo { font-size: 26px; font-weight: bold; margin-bottom: 25px; color: #fff; letter-spacing: 1px; }
        .logo span { color: #00d2ff; }
        .register-card h2 { font-size: 22px; margin-bottom: 8px; font-weight: 600; }
        .register-card p { color: #8b8b9f; font-size: 14px; margin-bottom: 30px; }

        /* INPUT FIELDS */
        .input-group { margin-bottom: 20px; text-align: left; }
        
        .theme-input {
            width: 100%; padding: 14px 18px; border-radius: 10px; border: 1px solid #3a3a4c;
            background: #151521; color: white; font-size: 15px; transition: 0.3s;
        }
        .theme-input:focus { outline: none; border-color: #b066fe; box-shadow: 0 0 10px rgba(176,102,254,0.2); }

        /* NEON BUTTON */
        .btn-submit {
            width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none;
            color: white; font-size: 16px; transition: 0.3s;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); /* Blue gradient for register */
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }

        /* FOOTER LINK */
        .footer-link { margin-top: 25px; color: #8b8b9f; font-size: 14px; }
        .footer-link a { color: #b066fe; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .footer-link a:hover { color: #00d2ff; }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="logo">Admin<span>Panel</span></div>
        
        <h2>Create Account</h2>
        <p>Register a new administrator account.</p>

        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required class="theme-input">
            </div>
            
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required class="theme-input">
            </div>
            
            <button type="submit" class="btn-submit">Register</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

</body>
</html>
